<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackForge – Sign In</title>
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/animations.css">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--border:#2a2a3a;--accent:#6366f1;--accent2:#8b5cf6;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.auth-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(139,92,246,.12) 0%,transparent 60%);pointer-events:none;}
.grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.auth-card{position:relative;background:rgba(18,18,26,.9);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:440px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(99,102,241,.08),0 32px 64px rgba(0,0,0,.4);}
.auth-card::before{content:'';position:absolute;inset:-1px;border-radius:20px;background:linear-gradient(135deg,rgba(99,102,241,.3),transparent 50%,rgba(139,92,246,.2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:1px;pointer-events:none;}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tab-bar{display:flex;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;margin-bottom:32px;}
.tab{flex:1;padding:9px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:7px;font-size:14px;font-weight:500;transition:.2s;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}
.form-group{margin-bottom:18px;}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:.2s;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;position:relative;overflow:hidden;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.otp-inputs{display:flex;gap:10px;justify-content:center;margin:20px 0;}
.otp-inputs input{width:50px;height:56px;text-align:center;font-size:24px;font-weight:700;padding:0;}
.step{display:none;}.step.active{display:block;}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.resend-link{color:var(--accent);cursor:pointer;font-size:13px;text-align:center;margin-top:12px;display:block;}
.resend-link:hover{text-decoration:underline;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="auth-bg"></div>
<div class="grid-overlay"></div>
<div class="auth-card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">HackForge</span>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div id="alert-box" style="display:none"></div>

  <!-- Login Flow -->
  <div id="login-flow">
    <div class="step active" id="login-step-1">
      <div class="form-group">
        <label>Email or Username</label>
        <input type="text" id="login-identifier" placeholder="you@example.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="submitLogin()">Sign In</button>
      <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--muted)">
        <span class="resend-link" onclick="showForgotPassword()">Forgot password?</span>
      </p>
    </div>
    <div class="step" id="login-forgot">
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px">Enter your email to receive a reset code.</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary" onclick="sendResetOTP()">Send Reset Code</button>
      <span class="resend-link" onclick="backToLogin()">← Back to sign in</span>
    </div>
    <div class="step" id="login-reset-otp">
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px">Enter the 6-digit code sent to your email.</p>
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-digit" data-form="reset">
        <input type="text" maxlength="1" class="otp-digit" data-form="reset">
        <input type="text" maxlength="1" class="otp-digit" data-form="reset">
        <input type="text" maxlength="1" class="otp-digit" data-form="reset">
        <input type="text" maxlength="1" class="otp-digit" data-form="reset">
        <input type="text" maxlength="1" class="otp-digit" data-form="reset">
      </div>
      <div class="form-group" style="margin-top:16px">
        <label>New Password</label>
        <input type="password" id="reset-new-password" placeholder="New password">
      </div>
      <button class="btn btn-primary" onclick="submitPasswordReset()">Reset Password</button>
    </div>
  </div>

  <!-- Signup Flow -->
  <div id="signup-flow" style="display:none">
    <div class="step active" id="signup-step-1">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Alex Johnson">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="alexj" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--muted);font-weight:400">(4–20 chars)</span></label>
        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" id="signup-btn" onclick="initiateSignup()">Create Account</button>
    </div>
    <div class="step" id="signup-step-2">
      <p style="color:var(--muted);font-size:14px;margin-bottom:6px">We sent a 6-digit code to</p>
      <p id="signup-email-display" style="color:var(--text);font-weight:600;margin-bottom:20px;font-size:14px"></p>
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-digit" data-form="signup">
        <input type="text" maxlength="1" class="otp-digit" data-form="signup">
        <input type="text" maxlength="1" class="otp-digit" data-form="signup">
        <input type="text" maxlength="1" class="otp-digit" data-form="signup">
        <input type="text" maxlength="1" class="otp-digit" data-form="signup">
        <input type="text" maxlength="1" class="otp-digit" data-form="signup">
      </div>
      <button class="btn btn-primary" onclick="verifySignupOTP()" style="margin-top:8px">Verify & Create Account</button>
      <span class="resend-link" onclick="resendOTP()">Didn't receive it? Resend</span>
    </div>
  </div>
</div>

<script>
const API = '/api/auth';
let currentTab = 'login';
let signupEmail = '';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('login-flow').style.display = tab==='login'?'block':'none';
  document.getElementById('signup-flow').style.display = tab==='signup'?'block':'none';
  clearAlert();
}

function showAlert(msg, type='error') {
  const box = document.getElementById('alert-box');
  box.className = `alert alert-${type}`;
  box.textContent = msg;
  box.style.display = 'block';
}
function clearAlert() { document.getElementById('alert-box').style.display='none'; }

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if(!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Loading...' : btn.dataset.label || btn.textContent;
  if(!btn.dataset.label) btn.dataset.label = btn.textContent;
}

async function submitLogin() {
  const identifier = document.getElementById('login-identifier').value.trim();
  const password = document.getElementById('login-password').value;
  if(!identifier || !password) return showAlert('Please fill in all fields');
  setLoading('login-btn', true);
  try {
    const r = await fetch(`${API}/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({identifier, password}), credentials:'include'});
    const d = await r.json();
    if(d.success) { window.location.href = '/dashboard'; }
    else showAlert(d.error || 'Login failed');
  } catch(e) { showAlert('Connection error'); }
  setLoading('login-btn', false);
}

async function initiateSignup() {
  const data = {
    full_name: document.getElementById('signup-name').value.trim(),
    username: document.getElementById('signup-username').value.trim(),
    email: document.getElementById('signup-email').value.trim(),
    password: document.getElementById('signup-password').value
  };
  if(!data.full_name||!data.username||!data.email||!data.password) return showAlert('Please fill in all fields');
  setLoading('signup-btn', true);
  try {
    const r = await fetch(`${API}/signup/initiate`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    const d = await r.json();
    if(d.success) {
      signupEmail = data.email;
      document.getElementById('signup-email-display').textContent = data.email;
      showStep('signup-step-1', 'signup-step-2', 'signup-flow');
      clearAlert();
      focusFirstOTP('signup');
    } else showAlert(d.error || 'Signup failed');
  } catch(e) { showAlert('Connection error'); }
  setLoading('signup-btn', false);
}

async function verifySignupOTP() {
  const otp = getOTPValue('signup');
  if(otp.length !== 6) return showAlert('Enter the 6-digit code');
  try {
    const r = await fetch(`${API}/signup/verify`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email: signupEmail, otp}), credentials:'include'});
    const d = await r.json();
    if(d.success) window.location.href='/dashboard';
    else showAlert(d.error || 'Invalid code');
  } catch(e) { showAlert('Connection error'); }
}

async function resendOTP() {
  const r = await fetch(`${API}/signup/resend`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email: signupEmail})});
  const d = await r.json();
  showAlert(d.success ? 'Code resent!' : d.error || 'Failed', d.success ? 'success' : 'error');
}

function showForgotPassword() { showStep('login-step-1','login-forgot','login-flow'); }
function backToLogin() { showStep('login-forgot','login-step-1','login-flow'); }

async function sendResetOTP() {
  const email = document.getElementById('forgot-email').value.trim();
  if(!email) return showAlert('Enter your email');
  const r = await fetch(`${API}/forgot-password`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})});
  const d = await r.json();
  if(d.success) { showStep('login-forgot','login-reset-otp','login-flow'); clearAlert(); focusFirstOTP('reset'); }
  else showAlert(d.error || 'Failed');
}

async function submitPasswordReset() {
  const email = document.getElementById('forgot-email').value.trim();
  const otp = getOTPValue('reset');
  const new_password = document.getElementById('reset-new-password').value;
  if(otp.length!==6 || !new_password) return showAlert('Fill in all fields');
  const r = await fetch(`${API}/reset-password`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, otp, new_password}), credentials:'include'});
  const d = await r.json();
  if(d.success) { showAlert('Password reset! Redirecting...','success'); setTimeout(()=>window.location.href='/dashboard',1500); }
  else showAlert(d.error || 'Failed');
}

function showStep(hideId, showId, flowId) {
  const flow = document.getElementById(flowId);
  flow.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(showId).classList.add('active');
}

function getOTPValue(form) {
  return Array.from(document.querySelectorAll(`.otp-digit[data-form="${form}"]`)).map(i=>i.value).join('');
}

function focusFirstOTP(form) {
  const inputs = document.querySelectorAll(`.otp-digit[data-form="${form}"]`);
  if(inputs[0]) inputs[0].focus();
}

// OTP digit auto-advance
document.addEventListener('input', e=>{
  if(!e.target.classList.contains('otp-digit')) return;
  e.target.value = e.target.value.replace(/\D/,'');
  if(e.target.value && e.target.nextElementSibling?.classList.contains('otp-digit')) e.target.nextElementSibling.focus();
});
document.addEventListener('keydown', e=>{
  if(!e.target.classList.contains('otp-digit')) return;
  if(e.key==='Backspace' && !e.target.value && e.target.previousElementSibling?.classList.contains('otp-digit')) e.target.previousElementSibling.focus();
});

// Enter key support
document.addEventListener('keydown', e=>{
  if(e.key==='Enter') {
    if(currentTab==='login') submitLogin();
  }
});
</script>
</body>
</html>
